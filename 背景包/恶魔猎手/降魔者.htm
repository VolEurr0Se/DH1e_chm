<H3><FONT color=#800000>降魔者 Daemonic Vanquisher</FONT></H3>
<P>职业：任意职业</P>
<P>花费：300XP</P>
<P>帝皇召唤，听者皆当应召。能以战斗击败恶魔者寥寥，圣锤修会则倾力将这群无价的战士收为己用。无论是一对一的正面较量，还是与战友并肩作战（比如一整支帝国卫队），该名角色都曾击败过亚空间中的某个污秽之物。但凡听闻此事的人都看得出来，角色在面对如此可怖之敌时所展露的勇气，正是其蒙受帝皇庇佑的证明。</P>
<H4><FONT color=#800000>效果 Effects</FONT></H4>
<P>将以下所有效果应用到你的角色上：</P>
<P><STRONG><FONT color=#800000>技能 Skills</FONT></STRONG>：角色获得禁忌知识（恶魔学）技能。</P>
<P><STRONG><FONT color=#800000>天赋 
Talents</FONT></STRONG>：角色获得宿敌（恶魔）天赋。</P></body>
