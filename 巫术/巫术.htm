<P>《黑暗异端》1E 中的巫术规则来自扩展《黑暗诸神的门徒》和《激进派手册》，下文按出版顺序进行了整合。</P>
<P>此外，尽管<STRONG><FONT color=#ff0000>Sorcerer</FONT></STRONG>与<STRONG><FONT color=#ff0000>Witch</FONT></STRONG>在通常情况下含义重叠，均被译为<STRONG><FONT color=#ff0000>巫师</FONT></STRONG>，但二者在规则文本中扮演着不同角色。具体而言，Sorcerer一词在规则中指代任何具备巫术天赋者；而Witch的含义更为宽泛，既指具备巫术天赋的灵能者，也可泛指任何能使用亚空间力量的角色（包括帝国灵能者）。</P>
<P>综上考虑，Sorcerer这一具体的规则术语，在本文中被译为“<FONT color=#ff0000><STRONG>术士</STRONG></FONT>”，以便和泛用的“巫师（Witch）”从规则层面做出区分。然而，在规则之外的叙事文本中，二者常被混用。</P></body>
